# IronClaw configuration file.
#
# Priority: env var > this file > database settings > defaults.
# Uncomment and edit values to override defaults.
# Run `ironclaw config init` to regenerate this file.
#
# Documentation: https://github.com/nearai/ironclaw

onboard_completed = true
secrets_master_key_source = "env"

[embeddings]
enabled = false
provider = "nearai"
model = "text-embedding-3-small"

[tunnel]
ts_funnel = false

[channels]
http_enabled = false
signal_enabled = false
wasm_channels = ["telegram"]
wasm_channels_enabled = true

[heartbeat]
enabled = true
interval_secs = 1800

[agent]
name = "near"
max_parallel_jobs = 5
job_timeout_secs = 3600
stuck_threshold_secs = 300
use_planning = true
repair_check_interval_secs = 60
max_repair_attempts = 3
session_idle_timeout_secs = 604800
max_tool_iterations = 50
auto_approve_tools = false

[wasm]
enabled = true
default_memory_limit = 10485760
default_timeout_secs = 60
default_fuel_limit = 10000000
cache_compiled = true

[sandbox]
enabled = true
policy = "readonly"
timeout_secs = 120
memory_limit_mb = 2048
cpu_shares = 1024
image = "ironclaw-worker:latest"
auto_pull_image = true
extra_allowed_domains = []

[safety]
max_output_length = 100000
injection_check_enabled = true

[builder]
enabled = true
max_iterations = 20
timeout_secs = 600
auto_register = true
